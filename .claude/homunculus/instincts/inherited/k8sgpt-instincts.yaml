# K8sgpt Workflow Bugfix With Unit Test

## Action

Follow the bugfix-with-unit-test workflow:
1. Identify and fix the bug in the analyzer implementation file (e.g., *.go).
2. Add or update a corresponding unit test file (e.g., *_test.go) to cover the bug or regression.
3. Commit both the implementation and test changes together.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: pkg/analyzer/*.go, pkg/analyzer/*_test.go

